<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width">
    <title>My Packages — Delivery Tracker</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .welcome-banner {
            background: linear-gradient(135deg, #1e3a5f, #1e293b);
            border-radius: 16px;
            padding: 32px;
            margin-bottom: 24px;
            border: 1px solid #3b82f6;
            animation: fadeIn 0.5s ease;
        }

        .welcome-banner h2 {
            font-size: 24px;
            color: #e2e8f0;
            margin-bottom: 8px;
        }

        .welcome-banner p {
            color: #94a3b8;
            font-size: 15px;
        }

        .notification-box {
            background: #052e16;
            border: 1px solid #16a34a;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 24px;
            animation: slideIn 0.5s ease;
        }

        .notification-box h3 {
            color: #4ade80;
            font-size: 16px;
            margin-bottom: 8px;
        }

        .notification-box p {
            color: #86efac;
            font-size: 14px;
            line-height: 1.6;
        }

        .tracking-code-display {
            background: #0f172a;
            border: 2px dashed #3b82f6;
            border-radius: 8px;
            padding: 12px 20px;
            margin: 12px 0;
            font-family: monospace;
            font-size: 20px;
            color: #60a5fa;
            text-align: center;
            letter-spacing: 2px;
        }

        .copy-btn {
            background: #1e3a5f;
            color: #60a5fa;
            border: 1px solid #3b82f6;
            padding: 8px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            width: auto;
            margin: 0 auto;
            display: block;
            transition: all 0.2s;
        }

        .copy-btn:hover {
            background: #3b82f6;
            color: white;
        }

        .package-card {
            background: #1e293b;
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 16px;
            border: 1px solid #334155;
            transition: all 0.3s;
            animation: fadeIn 0.5s ease;
        }

        .package-card:hover {
            border-color: #3b82f6;
            transform: translateY(-2px);
        }

        .package-card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .package-card-header h3 {
            font-family: monospace;
            color: #60a5fa;
            font-size: 16px;
        }

        .progress-bar {
            display: flex;
            justify-content: space-between;
            margin: 20px 0;
            position: relative;
        }

        .progress-bar::before {
            content: '';
            position: absolute;
            top: 20px;
            left: 0;
            right: 0;
            height: 2px;
            background: #334155;
        }

        .progress-step {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            z-index: 1;
        }

        .progress-dot {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #334155;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            transition: all 0.3s;
        }

        .progress-dot.active {
            background: #3b82f6;
            box-shadow: 0 0 12px #3b82f6;
        }

        .progress-dot.done { background: #22c55e; }

        .progress-label {
            font-size: 11px;
            color: #64748b;
        }

        .pkg-details {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 16px;
        }

        .pkg-detail {
            background: #0f172a;
            border-radius: 8px;
            padding: 12px;
        }

        .pkg-detail-label {
            font-size: 11px;
            color: #64748b;
            margin-bottom: 4px;
        }

        .pkg-detail-value {
            font-size: 14px;
            color: #e2e8f0;
        }

        .track-btn {
            background: #0f766e;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            width: auto;
            margin-top: 12px;
            transition: background 0.2s;
        }

        .track-btn:hover { background: #0d9488; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #475569;
        }

        .empty-state p {
            font-size: 16px;
            margin-top: 12px;
        }
    </style>
</head>
<body>

<nav class="navbar">
    <h1>📦 Delivery Tracker</h1>
    <div>
        <span style="color:#94a3b8;font-size:14px"
              id="navName"></span>
        <a href="login.html"
           style="margin-left:16px"
           onclick="logout()">Sign Out</a>
    </div>
</nav>

<div class="container">

    <div class="welcome-banner">
        <h2>👋 Welcome, <span id="welcomeName"></span>!</h2>
        <p>Here you can view all your packages
            and track their location in real time.</p>
    </div>

    <div id="notificationsArea"></div>

    <div class="card">
        <h2>📦 My Packages</h2>
        <div id="packagesArea">
            <div class="empty-state">
                <p>Loading packages...</p>
            </div>
        </div>
    </div>

</div>

<script>
    const API = 'http://localhost:8080/api';

    const statusOrder = [
        'CREATED', 'PICKED_UP', 'IN_TRANSIT', 'DELIVERED'
    ];

    const statusLabels = {
        'CREATED': 'Created',
        'PICKED_UP': 'Picked Up',
        'IN_TRANSIT': 'In Transit',
        'DELIVERED': 'Delivered'
    };

    const statusIcons = {
        'CREATED': '📦',
        'PICKED_UP': '🚛',
        'IN_TRANSIT': '🏭',
        'DELIVERED': '✅'
    };

    const senderEmail = localStorage.getItem('senderEmail');
    const senderName = localStorage.getItem('senderName');

    if (!senderEmail) {
        window.location.href = 'login.html';
    }

    document.getElementById('welcomeName').textContent =
        senderName || 'User';
    document.getElementById('navName').textContent =
        senderEmail || '';

    loadPackages();

    async function loadPackages() {
        try {
            const res = await fetch(
                `${API}/packages/email/${encodeURIComponent(senderEmail)}`);
            const packages = await res.json();
            showNotifications(packages);
            showPackages(packages);
        } catch (err) {
            document.getElementById('packagesArea').innerHTML = `
            <div class="empty-state">
                <p>❌ Connection error!</p>
            </div>`;
        }
    }

    function showNotifications(packages) {
        const area = document.getElementById('notificationsArea');
        const newPackages = packages.filter(
            p => p.status === 'CREATED');

        if (newPackages.length > 0) {
            area.innerHTML = newPackages.map(pkg => `
            <div class="notification-box">
                <h3>✅ Your package has been received!</h3>
                <p>
                    Your package to
                    <strong>${pkg.destination}</strong>
                    has been successfully registered.<br><br>
                    Use the code below to track your package:
                </p>
                <div class="tracking-code-display">
                    ${pkg.trackingCode}
                </div>
                <button class="copy-btn"
                        onclick="copyCode('${pkg.trackingCode}')">
                    📋 Copy Code
                </button>
            </div>
        `).join('');
        }
    }

    function showPackages(packages) {
        const area = document.getElementById('packagesArea');

        if (packages.length === 0) {
            area.innerHTML = `
            <div class="empty-state">
                <p>No packages found.</p>
            </div>`;
            return;
        }

        area.innerHTML = packages.map(pkg => `
        <div class="package-card">
            <div class="package-card-header">
                <h3>${pkg.trackingCode}</h3>
                <span class="status-badge ${pkg.status}">
                    ${statusIcons[pkg.status]} ${pkg.status}
                </span>
            </div>

            <div class="progress-bar">
                ${statusOrder.map((s, index) => {
            const currentIndex = statusOrder
                .indexOf(pkg.status);
            let dotClass = 'progress-dot';
            if (index < currentIndex)
                dotClass += ' done';
            else if (index === currentIndex)
                dotClass += ' active';
            return `
                        <div class="progress-step">
                            <div class="${dotClass}">
                                ${statusIcons[s]}
                            </div>
                            <span class="progress-label">
                                ${statusLabels[s]}
                            </span>
                        </div>`;
        }).join('')}
            </div>

            <div class="pkg-details">
                <div class="pkg-detail">
                    <div class="pkg-detail-label">Destination</div>
                    <div class="pkg-detail-value">
                        📍 ${pkg.destination}
                    </div>
                </div>
                <div class="pkg-detail">
                    <div class="pkg-detail-label">
                        Current Location
                    </div>
                    <div class="pkg-detail-value">
                        🏭 ${pkg.currentLocation || 'Pending'}
                    </div>
                </div>
                <div class="pkg-detail">
                    <div class="pkg-detail-label">Weight</div>
                    <div class="pkg-detail-value">
                        ⚖️ ${pkg.weight} kg
                    </div>
                </div>
                <div class="pkg-detail">
                    <div class="pkg-detail-label">Created</div>
                    <div class="pkg-detail-value">
                        📅 ${new Date(pkg.createdAt)
            .toLocaleDateString('en-GB')}
                    </div>
                </div>
            </div>

            <button class="track-btn"
                    onclick="window.location.href=
                        'track.html?code=${pkg.trackingCode}'">
                🔍 Track in Detail
            </button>
        </div>
    `).join('');
    }

    function copyCode(code) {
        navigator.clipboard.writeText(code);
        alert('✅ Code copied: ' + code);
    }

    function logout() {
        localStorage.removeItem('senderEmail');
        localStorage.removeItem('senderName');
    }
</script>

</body>
</html>c
